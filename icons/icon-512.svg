<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1a"/>
      <stop offset="100%" style="stop-color:#13162a"/>
    </linearGradient>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#00e5a0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#grd)" stroke-width="6" filter="url(#glow)" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="256" rx="140" ry="56" fill="none" stroke="url(#grd)" stroke-width="3" opacity="0.5"/>
  <ellipse cx="256" cy="256" rx="140" ry="100" fill="none" stroke="url(#grd)" stroke-width="2" opacity="0.3"/>
  <!-- Vertical meridian -->
  <ellipse cx="256" cy="256" rx="56" ry="140" fill="none" stroke="url(#grd)" stroke-width="3" opacity="0.5"/>
  <!-- Horizontal equator -->
  <line x1="116" y1="256" x2="396" y2="256" stroke="url(#grd)" stroke-width="3" opacity="0.5"/>
  <!-- Vertical axis -->
  <line x1="256" y1="116" x2="256" y2="396" stroke="url(#grd)" stroke-width="3" opacity="0.5"/>
  <!-- Arrow up-right (export) -->
  <g filter="url(#glow)" opacity="0.9">
    <line x1="220" y1="292" x2="292" y2="220" stroke="#00e5a0" stroke-width="10" stroke-linecap="round"/>
    <polyline points="260,220 292,220 292,252" fill="none" stroke="#00e5a0" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Arrow down-left (import) -->
  <g filter="url(#glow)" opacity="0.7">
    <line x1="292" y1="292" x2="220" y2="220" stroke="#6c63ff" stroke-width="8" stroke-linecap="round"/>
    <polyline points="252,220 220,220 220,252" fill="none" stroke="#6c63ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
